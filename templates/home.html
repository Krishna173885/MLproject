<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .container {
            width: 40%;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        legend {
            font-size: 20px;
            font-weight: bold;
            color: #555;
        }

        .mb-3 {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            color: #444;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: #5a67d8;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
            color: green;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Student Exam Performance Indicator</h1>

    <form action="{{ url_for('predict_datapoint')}}" method="post">
        <legend>Prediction Form</legend>

        <!-- Gender -->
        <div class="mb-3">
            <label>Gender</label>
            <select class="form-control" name="gender" required>
                <option disabled selected value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <!-- Ethnicity -->
        <div class="mb-3">
            <label>Race or Ethnicity</label>
            <select class="form-control" name="ethnicity" required>
                <option disabled selected value="">Select Ethnicity</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <!-- Parent Education -->
        <div class="mb-3">
            <label>Parental Education</label>
            <select class="form-control" name="parental_level_of_education" required>
                <option disabled selected value="">Select Education</option>
                <option value="associate's degree">associate's degree</option>
                <option value="bachelor's degree">bachelor's degree</option>
                <option value="high school">high school</option>
                <option value="master's degree">master's degree</option>
                <option value="some college">some college</option>
                <option value="some high school">some high school</option>
            </select>
        </div>

        <!-- Lunch -->
        <div class="mb-3">
            <label>Lunch Type</label>
            <select class="form-control" name="lunch" required>
                <option disabled selected value="">Select Lunch</option>
                <option value="free/reduced">free/reduced</option>
                <option value="standard">standard</option>
            </select>
        </div>

        <!-- Test Prep -->
        <div class="mb-3">
            <label>Test Preparation</label>
            <select class="form-control" name="test_preparation_course" required>
                <option disabled selected value="">Select Course</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <!-- Scores -->
        <div class="mb-3">
            <label>Reading Score</label>
            <input class="form-control" type="number" name="reading_score" min="0" max="100" required>
        </div>

        <div class="mb-3">
            <label>Writing Score</label>
            <input class="form-control" type="number" name="writing_score" min="0" max="100" required>
        </div>

        <!-- Button -->
        <div class="mb-3">
            <input class="btn" type="submit" value="Predict Maths Score">
        </div>
    </form>

    <h2>Prediction: {{results}}</h2>
</div>
</body>
</html>
